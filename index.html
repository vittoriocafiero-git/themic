<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>The Mic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

    header {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 16px 16px;
      border-bottom: 1px solid #1c1c1c;
    }
    header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }

    .feed {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 2px;
    }
    .feed-item { aspect-ratio: 1; background: #111; overflow: hidden; }
    .feed-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    #tongue-btn {
      position: fixed; bottom: 24px; right: 20px;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: #25d366;
      border: none; cursor: pointer;
      font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      z-index: 100;
      transition: transform 0.1s;
    }
    #tongue-btn:active { transform: scale(0.93); }
    #tongue-btn:disabled { opacity: 0.6; }

    #pip {
      position: fixed; bottom: 94px; right: 20px;
      width: 72px; height: 72px;
      border-radius: 50%; overflow: hidden;
      border: 2px solid #25d366;
      display: none; z-index: 100;
    }
    #pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    #status {
      position: fixed; bottom: 176px; right: 16px;
      background: rgba(0,0,0,0.8);
      padding: 5px 10px; border-radius: 10px;
      font-size: 12px; display: none; z-index: 100;
      max-width: 150px; text-align: center;
    }

    #toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(40,40,40,0.95);
      padding: 10px 18px; border-radius: 20px;
      font-size: 13px; display: none; z-index: 200;
      white-space: nowrap;
    }

    #cam { display: none; width: 320px; height: 240px; }
  </style>
</head>
<body>

<header>
  <!-- Cone-shaped mic SVG logo -->
  <svg width="42" height="50" viewBox="0 0 42 50" fill="none">
    <path d="M6 6 Q21 1 36 6 L28 34 Q21 38 14 34 Z" fill="#d0d0d0"/>
    <line x1="7.5"  y1="14" x2="34.5" y2="14" stroke="#888" stroke-width="0.8"/>
    <line x1="8.5"  y1="22" x2="33.5" y2="22" stroke="#888" stroke-width="0.8"/>
    <line x1="10"   y1="30" x2="32"   y2="30" stroke="#888" stroke-width="0.8"/>
    <line x1="21"   y1="2"  x2="21"   y2="36" stroke="#888" stroke-width="0.8"/>
    <line x1="14"   y1="3"  x2="12"   y2="36" stroke="#888" stroke-width="0.6" opacity="0.6"/>
    <line x1="28"   y1="3"  x2="30"   y2="36" stroke="#888" stroke-width="0.6" opacity="0.6"/>
    <rect x="18" y="34" width="6" height="7" fill="#999" rx="1.5"/>
    <rect x="20" y="41" width="2" height="7" fill="#bbb" rx="1"/>
    <ellipse cx="21" cy="48" rx="11" ry="2.5" fill="#999"/>
  </svg>
  <h1>The Mic</h1>
</header>

<main class="feed">
  <div class="feed-item"><img src="https://picsum.photos/seed/mic1/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic2/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic3/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic4/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic5/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic6/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic7/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic8/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic9/600/600"  alt="" loading="lazy"></div>
  <div class="feed-item"><img src="https://picsum.photos/seed/mic10/600/600" alt="" loading="lazy"></div>
</main>

<button id="tongue-btn">👅</button>
<div id="pip"><video id="pip-video" autoplay muted playsinline></video></div>
<div id="status"></div>
<div id="toast"></div>
<video id="cam" autoplay muted playsinline></video>

<!-- MediaPipe FaceMesh — plain script tag, no ES module imports needed -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
const MOUTH_OPEN_TH = 0.03;   // normalized Y gap between inner lips = "tongue out"
const SCROLL_MULT   = 3500;   // scale lip-delta to px

let active     = false;
let fm         = null;
let loopId     = null;
let processing = false;
let prevLipY   = null;

const btn      = document.getElementById("tongue-btn");
const pip      = document.getElementById("pip");
const pipVideo = document.getElementById("pip-video");
const cam      = document.getElementById("cam");
const statusEl = document.getElementById("status");
const toast    = document.getElementById("toast");

function showToast(msg, ms = 3000) {
  toast.textContent = msg;
  toast.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.display = "none"; }, ms);
}

function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.style.display = msg ? "block" : "none";
}

function onFaceResults(results) {
  if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
    prevLipY = null;
    setStatus("👁 no face");
    return;
  }
  const lm   = results.multiFaceLandmarks[0];
  const open = Math.abs(lm[14].y - lm[13].y);  // 13=upper inner lip, 14=lower inner lip

  if (open > MOUTH_OPEN_TH) {
    const lipY = lm[14].y;
    if (prevLipY !== null) {
      window.scrollBy({ top: (lipY - prevLipY) * SCROLL_MULT, behavior: "auto" });
    }
    prevLipY = lipY;
    setStatus("👅 scrolling");
  } else {
    prevLipY = null;
    setStatus("😐 tongue out to scroll");
  }
}

async function buildFaceMesh() {
  const mesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  mesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5
  });
  mesh.onResults(onFaceResults);
  if (typeof mesh.initialize === "function") await mesh.initialize();
  return mesh;
}

function stopAll() {
  active = false;
  clearInterval(loopId);
  loopId = null;
  if (cam.srcObject) { cam.srcObject.getTracks().forEach(t => t.stop()); cam.srcObject = null; }
  pip.style.display = "none";
  setStatus(null);
  btn.textContent = "👅";
  btn.disabled = false;
}

btn.addEventListener("click", async () => {
  if (active) { stopAll(); return; }

  btn.textContent = "⏳";
  btn.disabled = true;

  try {
    showToast("Starting camera…");
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } }
    });
    cam.srcObject      = stream;
    pipVideo.srcObject = stream;
    await cam.play();

    showToast("Loading model… (first launch ~5 s)");
    if (!fm) fm = await buildFaceMesh();

    // 10 fps, no frame stacking
    processing = false;
    loopId = setInterval(async () => {
      if (processing || !active) return;
      processing = true;
      try { await fm.send({ image: cam }); } catch (_) {}
      processing = false;
    }, 100);

    active = true;
    pip.style.display = "block";
    setStatus("😐 tongue out to scroll");
    btn.textContent = "🛑";
    btn.disabled = false;
    showToast("Ready! Stick out your tongue 👅", 3000);

  } catch (e) {
    console.error(e);
    showToast("Error: " + (e.message || String(e)), 5000);
    btn.textContent = "👅";
    btn.disabled = false;
  }
});
</script>

</body>
</html>
