<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Mic</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid #222;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo svg {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #e8e0d0;
      line-height: 1;
    }

    .logo-text span {
      color: #c8a040;
    }

    .tagline {
      margin-top: 12px;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
    }

    /* ── GRID ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(325px, 1fr));
      gap: 24px;
      justify-items: center;
    }

    .post-wrap {
      width: 100%;
      max-width: 605px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1e1e1e;
      transition: border-color 0.2s;
    }

    .post-wrap:hover {
      border-color: #c8a040;
    }

    .post-wrap blockquote {
      width: 100% !important;
      min-width: unset !important;
      max-width: 100% !important;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      color: #333;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      border-top: 1px solid #1a1a1a;
    }

    /* ── TONGUE SCROLL ── */

    /* Hidden video feed */
    #tongue-video {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 320px;
      height: 240px;
    }

    /* PIP camera preview */
    #tongue-pip {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 90px;
      height: 68px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #c8a040;
      z-index: 1000;
      display: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.7);
    }

    #tongue-pip video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror for selfie */
    }

    /* Toggle button */
    #tongue-btn {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #333;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #tongue-btn.active {
      background: #1e1600;
      border-color: #c8a040;
      box-shadow: 0 0 16px rgba(200,160,64,0.5);
    }

    /* Status badge */
    #tongue-status {
      position: fixed;
      bottom: 98px;
      right: 16px;
      background: rgba(0,0,0,0.75);
      color: #c8a040;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #c8a04055;
      z-index: 1001;
      display: none;
      white-space: nowrap;
    }

    /* Debug readout */
    #tongue-debug {
      position: fixed;
      top: 92px;
      left: 16px;
      background: rgba(0,0,0,0.8);
      color: #0f0;
      font-family: monospace;
      font-size: 0.65rem;
      padding: 4px 8px;
      border-radius: 6px;
      z-index: 1002;
      display: none;
      line-height: 1.5;
      pointer-events: none;
    }

    /* Toast */
    #tongue-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #f0f0f0;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.82rem;
      z-index: 1002;
      display: none;
      border: 1px solid #333;
    }
  </style>
</head>

      <rect x="30" y="62" width="12" height="3" rx="1.5" fill="#888"/>
      <rect x="34.5" y="46" width="3" height="17" rx="1.5" fill="#888"/>
      <path d="M36 46 Q36 36 26 32" stroke="#888" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M18 14 L22 44 L34 46 L34 12 Z" fill="#c8a040"/>

<!-- Tongue scroll UI -->
<div id="tongue-pip">
  <video id="pip-video" autoplay muted playsinline></video>
</div>

<video id="tongue-video" autoplay muted playsinline></video>

<button id="tongue-btn" title="Tongue scroll">👅</button>
<div id="tongue-status"></div>

<!-- TikTok posts -->
<script>
  const posts = [
    { user: "buildrescue",         id: "7610073831037766934" },
    { user: "us_delicious_cooking",id: "7612045334025342221" },
    { user: "the_pastaqueen",      id: "7613122317987630366" },
    { user: "superhomecook",       id: "7612699998161063190" },
    { user: "cedriklorenzen",      id: "7596713133293587734" },
    { user: "kerrangradio",        id: "7612045099958127894" },
    { user: "mymicrowavepro",      id: "7610600736778489102" },
    { user: "jasminenicole1995",   id: "7612514010029706509" },
  ];

  const grid = document.getElementById("grid");

  posts.forEach(({ user, id }) => {
    const url = `https://www.tiktok.com/@${user}/video/${id}`;
    const wrap = document.createElement("div");
    wrap.className = "post-wrap";
    wrap.innerHTML = `
      <blockquote class="tiktok-embed"
        cite="${url}"
        data-video-id="${id}">
        <section></section>
      </blockquote>`;
    grid.appendChild(wrap);
  });
</script>

<script async src="https://www.tiktok.com/embed.js"></script>

<!-- MediaPipe Face Landmarker — runs 100% in browser, no API key -->
<script type="module">
import { FaceLandmarker, FilesetResolver } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/vision_bundle.mjs";

const MOUTH_OPEN_THRESHOLD = 0.025; // normalized distance to consider mouth "open" (tongue out)
const SCROLL_MULTIPLIER    = 4000;  // scale normalized delta to pixels
const SMOOTH_FRAMES        = 3;
const MISS_FRAMES_STOP     = 8;

const btn      = document.getElementById("tongue-btn");
const pip      = document.getElementById("tongue-pip");
const pipVideo = document.getElementById("pip-video");
const hidVideo = document.getElementById("tongue-video");
const statusEl = document.getElementById("tongue-status");
const dbg      = document.getElementById("tongue-debug");
const toast    = document.getElementById("tongue-toast");

const TARGET_FPS = 12;  // cap inference to ~12fps to avoid overloading mobile GPUs
const FRAME_MS   = Math.round(1000 / TARGET_FPS);

let active     = false;
let landmarker = null;
let stream     = null;
let loopTimer  = null;
let detecting  = false;  // re-entry guard
let prevY      = null;
let yHistory   = [];
let missCount  = 0;
let frameCount = 0;

function showToast(msg, ms = 4000) {
  toast.textContent = msg;
  toast.style.display = "block";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.display = "none"; }, ms);
}

function setStatus(msg) {
  if (msg) { statusEl.textContent = msg; statusEl.style.display = "block"; }
  else { statusEl.style.display = "none"; }
}

/* ── Load MediaPipe Face Landmarker (one-time) ── */
async function loadModel() {
  if (landmarker) return;
  setStatus("loading model…");
  dbg.innerHTML = "downloading face model…";

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm/"
  );

  landmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath:
        "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU",
    },
    runningMode: "VIDEO",
    numFaces: 1,
    outputFaceBlendshapes: true,  // gives us tongueOut score
  });

  dbg.innerHTML = "model loaded ✓";
  console.log("MediaPipe FaceLandmarker loaded");
}

/* ── Camera ── */
async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 320 }, height: { ideal: 240 } }
  });
  hidVideo.srcObject = stream;
  pipVideo.srcObject = stream;
  await hidVideo.play();
  await pipVideo.play();
  pip.style.display = "block";
  dbg.style.display = "block";
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  hidVideo.srcObject = null;
  pipVideo.srcObject = null;
  pip.style.display  = "none";
  dbg.style.display  = "none";
}

/* ── Detection loop (100% local, zero network, guarded against stacking) ── */
function detectLoop() {
  if (!active || detecting) return;
  detecting = true;

  try {
    if (hidVideo.readyState >= 2) {
      const now = performance.now();
      const result = landmarker.detectForVideo(hidVideo, now);
      frameCount++;

      let tongueActive = false;
      let mouthCenterY = null;
      let openness = 0;
      let tongueOutScore = 0;

      if (result.faceLandmarks && result.faceLandmarks.length > 0) {
        const lm = result.faceLandmarks[0];

        // Landmarks 13 = inner upper lip center, 14 = inner lower lip center
        const upperLip = lm[13];
        const lowerLip = lm[14];
        openness = lowerLip.y - upperLip.y; // normalized 0–1
        mouthCenterY = (upperLip.y + lowerLip.y) / 2;

        // Check blendshapes for tongueOut if available
        if (result.faceBlendshapes && result.faceBlendshapes.length > 0) {
          const shapes = result.faceBlendshapes[0].categories;
          const tongueShape = shapes.find(s => s.categoryName === "tongueOut");
          tongueOutScore = tongueShape ? tongueShape.score : 0;
        }

        // Tongue is "active" if mouth is open enough OR blendshape says tongue is out
        tongueActive = openness > MOUTH_OPEN_THRESHOLD || tongueOutScore > 0.3;
      }

      // Debug
      dbg.innerHTML = `frame:${frameCount} | open:${(openness*1000).toFixed(1)}<br>`
        + `tongue:${tongueOutScore.toFixed(2)} | `
        + (tongueActive ? `y:${(mouthCenterY*1000).toFixed(0)}` : "closed");

      if (tongueActive && mouthCenterY !== null) {
        missCount = 0;

        yHistory.push(mouthCenterY);
        if (yHistory.length > SMOOTH_FRAMES) yHistory.shift();

        if (prevY !== null && yHistory.length >= 2) {
          const smoothed = yHistory.reduce((a, b) => a + b, 0) / yHistory.length;
          const delta = smoothed - prevY;
          window.scrollBy({ top: delta * SCROLL_MULTIPLIER, behavior: "auto" });
        }

        prevY = yHistory.reduce((a, b) => a + b, 0) / yHistory.length;
        setStatus("👅 scrolling");
      } else {
        missCount++;
        if (missCount >= MISS_FRAMES_STOP) {
          prevY = null; yHistory = [];
          setStatus("👅 ready");
        }
      }
    }
  } catch (e) {
    console.warn("Detect error:", e);
    dbg.innerHTML = "err: " + (e.message || String(e));
  }

  detecting = false;
  // Schedule next frame with fixed interval — prevents stacking
  if (active) loopTimer = setTimeout(detectLoop, FRAME_MS);
}

/* ── Activate / Deactivate ── */
async function activate() {
  btn.textContent = "⏳";
  btn.disabled    = true;
  setStatus("starting…");

  try {
    await startCamera();
    await loadModel();

    active = true;
    btn.classList.add("active");
    btn.textContent = "👅";
    btn.disabled    = false;
    setStatus("👅 ready — stick out your tongue!");
    showToast("Stick out tongue + move up/down to scroll", 3000);
    detectLoop();
  } catch (e) {
    console.error("Activate error:", e);
    btn.textContent = "👅";
    btn.disabled    = false;
    btn.classList.remove("active");
    setStatus(null);
    stopCamera();
    active = false;
    if (e.name === "NotAllowedError") {
      showToast("Camera permission denied.");
    } else {
      showToast("Error: " + (e.message || String(e)), 6000);
    }
  }
}

function deactivate() {
  active = false;
  if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
  detecting = false;
  stopCamera();
  btn.classList.remove("active");
  btn.textContent = "👅";
  prevY = null; yHistory = []; missCount = 0; frameCount = 0;
  setStatus(null);
}

btn.addEventListener("click", () => {
  if (active) deactivate();
  else activate();
});
</script>

</body>
</html>
